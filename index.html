<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom - Luxury Experience</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* --- Premium Animated Background --- */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            /* Luxury Mesh Gradient */
            background: linear-gradient(45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Glassy Header --- */
        header {
            width: 100%;
            height: 80px;
            background: rgba(255, 255, 255, 0.1); /* Transparent White */
            backdrop-filter: blur(15px); /* Frosty glass effect */
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .header-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 5px;
            /* Header Luxury Design Color Update - Metallic Luxury Gold Gradient */
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            text-shadow: none; /* Shadow replaced by filter for cleaner metallic look */
        }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
            z-index: 10;
        }

        /* Logo Design with Glow */
        .logo {
            font-size: clamp(65px, 18vw, 130px);
            font-weight: 900;
            margin-bottom: 40px;
            letter-spacing: -4px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
            user-select: none;
            /* Yahan background-clip ko text ke liye rakha gaya hai taaki spans ke colors dikhen */
        }

        /* Google Style Colors for Logo spans */
        .logo .s { color: #4285F4; } /* Blue */
        .logo .h { color: #EA4335; } /* Red */
        .logo .o1 { color: #FBBC05; } /* Yellow */
        .logo .o2 { color: #4285F4; } /* Blue */
        .logo .w { color: #34A853; } /* Green */
        .logo .r { color: #EA4335; } /* Red */
        .logo .o3 { color: #FBBC05; } /* Yellow */
        .logo .m { color: #34A853; } /* Green */

        /* Search Box - Glassmorphism style */
        .search-wrapper {
            width: 100%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px;
            border-radius: 60px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            display: flex;
            transition: all 0.4s ease;
        }

        .search-wrapper:focus-within {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.03);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .search-bar {
            width: 100%;
            padding: 18px 30px;
            font-size: 20px;
            border: none;
            outline: none;
            background: transparent;
            color: white;
        }

        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        /* Premium Buttons */
        .button-container {
            margin-top: 50px;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-search {
            background: white;
            color: #333;
        }

        .btn-open {
            background: rgba(0, 0, 0, 0.3);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .btn-open:hover {
            background: white;
            color: black;
        }

        /* Floating particles effect (Background ko zinda karne ke liye) */
        .bg-circle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            z-index: 1;
            filter: blur(50px);
        }

        footer {
            position: absolute;
            bottom: 25px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* --- New Addition: Open Door Page Section --- */
        #door-page {
            position: fixed;
            top: 0;
            left: 100%; /* Shuru mein screen ke bahar hoga */
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            z-index: 2000;
            transition: left 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Allowed scrolling for gallery */
            overflow-y: auto; 
            padding-top: 100px;
        }

        #door-page.active {
            left: 0; /* Click karne par screen par aa jayega */
        }

        .welcome-content {
            text-align: center;
            color: white;
            z-index: 10;
            width: 90%;
            max-width: 1000px;
        }

        /* --- Updated Addition: Location Grouping Styles --- */
        .location-section {
            margin-top: 50px;
            text-align: left;
            width: 100%;
        }

        .location-title {
            font-size: 24px;
            font-weight: bold;
            border-left: 5px solid gold;
            padding-left: 15px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .showroom-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            margin-bottom: 40px;
        }

        .gallery-item {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .item-info {
            padding: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 14px;
            text-align: center;
            font-weight: 500;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .close-btn {
            margin-top: 30px;
            padding: 12px 30px;
            border: 2px solid white;
            background: transparent;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            margin-bottom: 50px;
        }

        .close-btn:hover {
            background: white;
            color: #b21f1f;
        }
    </style>
</head>
<body>

    <div class="bg-circle" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
    <div class="bg-circle" style="width: 300px; height: 300px; bottom: -50px; right: -50px;"></div>

    <header id="main-header">
        <div class="header-title" id="header-text">SHOWROOM</div>
    </header>

    <div class="main-content">
        <div class="logo">
            <span class="s">S</span><span class="h">h</span><span class="o1">o</span><span class="o2">w</span><span class="w">r</span><span class="r">o</span><span class="o3">o</span><span class="m">m</span>
        </div>

        <div class="search-wrapper">
            <input type="text" class="search-bar" placeholder="Experience the Luxury...">
        </div>

        <div class="button-container">
            <button class="btn btn-search">Search Now</button>
            <button class="btn btn-open" onclick="openDoor()">Open Door Showroom</button>
        </div>
    </div>

    <div id="door-page">
        <header>
            <div class="header-title">Welcome Showroom</div>
        </header>
        <div class="welcome-content">
            <h1 style="font-size: 3rem; margin-bottom: 10px;">Swagat Hai!</h1>
            <p>Aapne Luxury Showroom ke darwaze khol diye hain.</p>
            
            <div id="showroomGallery">
                </div>

            <button class="close-btn" onclick="closeDoor()">Close Door</button>
        </div>
    </div>

    <footer>
        &copy; 2026 Showroom Elite | Premium Digital Experience
    </footer>

    <script type="module">
        // Import Firebase Functions
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // Your Firebase configuration
        const firebaseConfig = {
          apiKey: "AIzaSyB_b97VYqxV4cmNfQPCdXBfRDLG-Wjzlas",
          authDomain: "showroom-6b354.firebaseapp.com",
          projectId: "showroom-6b354",
          storageBucket: "showroom-6b354.firebasestorage.app",
          messagingSenderId: "261135013864",
          appId: "1:261135013864:web:2f718ebf2b7a411852365d",
          measurementId: "G-Q8B3XR50PF"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Real-time Photo Fetch & Grouping Logic ---
        const galleryContainer = document.getElementById('showroomGallery');
        const q = query(collection(db, "photos"), orderBy("createdAt", "desc"));

        onSnapshot(q, (snapshot) => {
            galleryContainer.innerHTML = ""; // Clear
            const locations = {};

            // Grouping items by location
            snapshot.forEach((doc) => {
                const data = doc.data();
                const locName = data.location || "General";
                if (!locations[locName]) {
                    locations[locName] = [];
                }
                locations[locName].push(data);
            });

            // Creating HTML for each location
            for (const loc in locations) {
                const section = document.createElement('div');
                section.className = "location-section";
                
                section.innerHTML = `<h2 class="location-title">${loc}</h2>`;
                
                const grid = document.createElement('div');
                grid.className = "showroom-gallery";

                locations[loc].forEach(itemData => {
                    const item = document.createElement('div');
                    item.className = "gallery-item";
                    item.innerHTML = `
                        <img src="${itemData.url}" alt="${itemData.item}">
                        <div class="item-info">${itemData.item || 'Premium Item'}</div>
                    `;
                    grid.appendChild(item);
                });

                section.appendChild(grid);
                galleryContainer.appendChild(section);
            }
        });
        
        console.log("Firebase connected. Location grouping active.");
    </script>

    <script>
        // Open Door Function
        function openDoor() {
            document.getElementById('door-page').classList.add('active');
        }

        // Close Door Function
        function closeDoor() {
            document.getElementById('door-page').classList.remove('active');
        }
    </script>

</body>
</html>
