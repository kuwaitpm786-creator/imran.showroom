<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom - Luxury Experience</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* --- Premium Animated Background --- */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            width: 100%;
            height: 80px;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); 
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .share-btn {
            position: absolute;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .share-btn:hover { background: white; color: #333; }

        .header-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 5px;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
            z-index: 10;
        }

        .logo {
            font-size: clamp(65px, 18vw, 130px);
            font-weight: 900;
            margin-bottom: 40px;
            letter-spacing: -4px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
            user-select: none;
            cursor: pointer; /* Clickable for hidden admin */
        }

        .logo .s { color: #4285F4; }
        .logo .h { color: #EA4335; }
        .logo .o1 { color: #FBBC05; }
        .logo .o2 { color: #4285F4; }
        .logo .w { color: #34A853; }
        .logo .r { color: #EA4335; }
        .logo .o3 { color: #FBBC05; }
        .logo .m { color: #34A853; }

        .search-wrapper {
            width: 100%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px;
            border-radius: 60px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            display: flex;
        }

        .search-bar {
            width: 100%;
            padding: 18px 30px;
            font-size: 20px;
            border: none;
            outline: none;
            background: transparent;
            color: white;
        }

        .search-bar::placeholder { color: rgba(255, 255, 255, 0.7); }

        .button-container {
            margin-top: 50px;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-search { background: white; color: #333; }
        .btn-open { background: rgba(0, 0, 0, 0.3); color: white; border: 1px solid white; }

        /* --- Admin UI Hidden --- */
        #admin-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 5000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .admin-box {
            background: #222;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #444;
        }

        .admin-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #111;
            color: white;
        }

        .admin-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #4285F4;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- Door Page --- */
        #door-page {
            position: fixed;
            top: 0; left: 100%; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            z-index: 2000;
            transition: 0.5s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            padding-top: 100px;
        }

        #door-page.active { left: 0; }

        .location-section { margin-top: 50px; text-align: left; width: 90%; }
        .location-title { font-size: 24px; border-left: 5px solid gold; padding-left: 15px; margin-bottom: 20px; color: white; }
        .showroom-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .gallery-item { border-radius: 15px; overflow: hidden; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .gallery-item img { width: 100%; height: 200px; object-fit: cover; }
        .item-info { padding: 10px; text-align: center; color: white; font-size: 14px; }

        footer { position: absolute; bottom: 25px; color: rgba(255,255,255,0.8); font-size: 14px; }
    </style>
</head>
<body>

    <div id="admin-overlay">
        <div class="admin-box" id="login-box">
            <h2>Admin Login</h2>
            <input type="password" id="passInput" class="admin-input" placeholder="Password">
            <button class="admin-btn" onclick="checkPassword()">Login</button>
            <p onclick="closeAdmin()" style="text-align:center; margin-top:10px; cursor:pointer; font-size:12px;">Close</p>
        </div>
        <div class="admin-box" id="add-box" style="display:none;">
            <h2>Add New Sample</h2>
            <input type="text" id="locInput" class="admin-input" placeholder="Location Name">
            <input type="text" id="itemName" class="admin-input" placeholder="Item Name">
            <input type="text" id="imgUrl" class="admin-input" placeholder="Image URL (Optional)">
            <label style="font-size: 12px; color: #888;">OR Upload Photo:</label>
            <input type="file" id="fileInput" class="admin-input" accept="image/*" style="padding: 5px;">
            <button class="admin-btn" onclick="saveToFirebase()" style="background:#34A853;">Add Website Per</button>
            <button class="admin-btn" onclick="closeAdmin()" style="background:#EA4335; margin-top:10px;">Exit</button>
        </div>
    </div>

    <header>
        <button class="share-btn" onclick="shareWebsite()"><span>Share</span></button>
        <div class="header-title">SHOWROOM</div>
    </header>

    <div class="main-content">
        <div class="logo" ondblclick="handleLogoClick()" onclick="handleLogoClickMobile()">
            <span class="s">S</span><span class="h">h</span><span class="o1">o</span><span class="o2">w</span><span class="w">r</span><span class="r">o</span><span class="o3">o</span><span class="m">m</span>
        </div>

        <div class="search-wrapper">
            <input type="text" id="mainSearch" class="search-bar" placeholder="Experience the Luxury...">
        </div>

        <div class="button-container">
            <button class="btn btn-search" onclick="triggerSearch()">Search Now</button>
            <button class="btn btn-open" onclick="openDoor()">Open Door Showroom</button>
        </div>
    </div>

    <div id="door-page">
        <header><div class="header-title">Welcome Showroom</div></header>
        <div class="welcome-content" style="width:100%; display:flex; flex-direction:column; align-items:center;">
            <h1 style="color:white;">Luxury Collections</h1>
            <div id="showroomGallery" style="width:90%;"></div>
            <button onclick="closeDoor()" style="margin:50px; padding:15px 30px; border-radius:30px; cursor:pointer;">Close Door</button>
        </div>
    </div>

    <footer>&copy; 2026 Showroom Elite</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
          apiKey: "AIzaSyB_b97VYqxV4cmNfQPCdXBfRDLG-Wjzlas",
          authDomain: "showroom-6b354.firebaseapp.com",
          projectId: "showroom-6b354",
          storageBucket: "showroom-6b354.firebasestorage.app",
          messagingSenderId: "261135013864",
          appId: "1:261135013864:web:2f718ebf2b7a411852365d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allFirebaseData = [];
        const galleryContainer = document.getElementById('showroomGallery');

        // Fetch Data
        const q = query(collection(db, "photos"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            allFirebaseData = [];
            snapshot.forEach((doc) => allFirebaseData.push(doc.data()));
            renderGallery(document.getElementById('mainSearch').value);
        });

        // Add Data
        window.saveToFirebase = async function() {
            const loc = document.getElementById('locInput').value;
            const item = document.getElementById('itemName').value;
            let url = document.getElementById('imgUrl').value;
            const file = document.getElementById('fileInput').files[0];

            if(!loc || !item) return alert("Location aur Item Name bharna zaroori hai!");

            // Function to handle Firestore Save
            const uploadToDB = async (finalUrl) => {
                await addDoc(collection(db, "photos"), {
                    location: loc,
                    item: item,
                    url: finalUrl,
                    createdAt: serverTimestamp()
                });
                alert("Success! Website par add ho gaya.");
                document.getElementById('itemName').value = "";
                document.getElementById('imgUrl').value = "";
                document.getElementById('fileInput').value = "";
            };

            // Logic: If file is selected, convert to base64, else use URL or Placeholder
            if(file) {
                const reader = new FileReader();
                reader.onloadend = async function() {
                    await uploadToDB(reader.result);
                };
                reader.readAsDataURL(file);
            } else {
                // If no URL and no File, use a placeholder or empty
                const finalUrl = url ? url : "https://via.placeholder.com/400x300?text=No+Photo";
                await uploadToDB(finalUrl);
            }
        };

        function renderGallery(filter = "") {
            galleryContainer.innerHTML = "";
            const lowerFilter = filter.toLowerCase();

            // All unique locations
            const locations = ["Welcome Hall", "Urban Work", "Electra", "Public Amenities"];
            allFirebaseData.forEach(d => { if(!locations.includes(d.location)) locations.push(d.location); });

            locations.forEach(loc => {
                let items = allFirebaseData.filter(i => i.location === loc);
                
                // Static Default Items
                if(loc === "Welcome Hall") {
                    items.push({item:"TL14", url:"https://via.placeholder.com/400x300?text=TL14"});
                    items.push({item:"TL41", url:"https://via.placeholder.com/400x300?text=TL41"});
                }

                const filtered = items.filter(i => (i.item && i.item.toLowerCase().includes(lowerFilter)) || (loc && loc.toLowerCase().includes(lowerFilter)));
                if(filtered.length === 0 && filter !== "") return;

                const sec = document.createElement('div');
                sec.className = "location-section";
                sec.innerHTML = `<h2 class="location-title">${loc}</h2><div class="showroom-gallery"></div>`;
                const grid = sec.querySelector('.showroom-gallery');

                filtered.forEach(item => {
                    grid.innerHTML += `<div class="gallery-item"><img src="${item.url}"><div class="item-info">${item.item}</div></div>`;
                });
                galleryContainer.appendChild(sec);
            });
        }

        window.triggerSearch = () => { renderGallery(document.getElementById('mainSearch').value); openDoor(); };
        document.getElementById('mainSearch').addEventListener('input', (e) => renderGallery(e.target.value));
    </script>

    <script>
        // Hidden Admin Login Logic
        let clickCount = 0;
        function handleLogoClick() { openAdmin(); } // For Desktop Double Click
        function handleLogoClickMobile() {
            clickCount++;
            if (clickCount === 3) { openAdmin(); clickCount = 0; }
            setTimeout(() => { clickCount = 0; }, 1000);
        }

        function openAdmin() { document.getElementById('admin-overlay').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-overlay').style.display = 'none'; }

        function checkPassword() {
            if(document.getElementById('passInput').value === "Imran123") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('add-box').style.display = 'block';
            } else { alert("Galat Password!"); }
        }

        function openDoor() { document.getElementById('door-page').classList.add('active'); }
        function closeDoor() { document.getElementById('door-page').classList.remove('active'); }

        function shareWebsite() {
            const data = { title: 'Showroom', url: 'https://kuwaitpm786-creator.github.io/imran.showroom/' };
            if (navigator.share) navigator.share(data);
            else { navigator.clipboard.writeText(data.url); alert("Link Copied!"); }
        }
    </script>
</body>
</html>
