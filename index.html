<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom | Premium Locator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a1a1a;
            --accent-color: #c5a059; /* Gold accent for premium feel */
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            color: var(--text-main);
            background-image: radial-gradient(#d1d1d1 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        /* Navbar Styling */
        nav {
            background: var(--primary-color);
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            color: white;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .admin-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .admin-link:hover { color: white; }

        /* Main Hero Section */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        p { color: #666; margin-bottom: 30px; }

        /* Modern Search Bar */
        .search-box {
            position: relative;
            max-width: 550px;
            margin: 0 auto 50px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        input[type="text"] {
            width: 100%;
            padding: 18px 30px;
            border-radius: 35px;
            border: 1px solid #eee;
            font-size: 1.1rem;
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
            transition: 0.4s;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.3);
            transform: scale(1.02);
        }

        /* Loading & Results */
        .status {
            font-style: italic;
            color: #888;
            margin-bottom: 20px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }

        /* Grid for multiple cards */
        .locations-grid {
            display: none; /* Initially hidden */
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .location-card {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.07);
            border: 1px solid rgba(0,0,0,0.03);
            border-top: 6px solid var(--accent-color);
            text-align: left;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .location-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.12);
        }

        .btn-back {
            background: #f0f0f0;
            border: none;
            padding: 10px 22px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
            font-weight: 600;
            color: #555;
        }

        .btn-back:hover { 
            background: var(--primary-color);
            color: white;
        }

        /* New Button Style for Open Door */
        .btn-open-door {
            background-color: var(--primary-color);
            color: white;
            padding: 14px 35px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.4s;
            border: 2px solid var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-open-door:hover {
            background-color: var(--accent-color);
            color: var(--primary-color);
            box-shadow: 0 8px 25px rgba(197, 160, 89, 0.4);
        }

        /* Admin Panel Styling */
        #adminPanel {
            display: none;
            background: #fff;
            padding: 20px;
            margin-top: 50px;
            border: 2px dashed var(--accent-color);
            border-radius: 15px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .admin-input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .item-box {
            background: #fafafa;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #eee;
            transition: 0.3s;
        }
        
        .item-box:hover {
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

    </style>
</head>
<body>

    <nav>
        <div class="logo">SHOWROOM</div>
    </nav>

    <div class="container" id="mainHome" style="margin-top: 80px;">
        <h1 style="font-size: 5rem; font-weight: 900; letter-spacing: -3px; margin-bottom: 10px; text-transform: uppercase;">
            SHOW<span style="color:var(--accent-color)">ROOM</span>
        </h1>
        <p style="font-size: 1.2rem; letter-spacing: 2px; font-weight: 300; margin-top: -10px;">EXCLUSIVITY IN EVERY CORNER</p>
        
        <div class="search-box">
            <input type="text" id="locationSearch" placeholder="Search locations or items (e.g. 'mt1')..." onkeyup="filterLocations()">
            <div style="margin-top: 20px;">
                <button class="btn-open-door" onclick="showAllLocations()">Open Door Showroom</button>
            </div>
        </div>
        <div id="statusText" class="status" style="display: none;">Showing available locations</div>

        <div class="locations-grid" id="locationsGrid">
            
            <div class="location-card" id="card-welcomehall">
                <button class="btn-back" onclick="goBack()">← Back</button>
                <div class="img-container"></div>
                <h2 style="margin:0; font-weight: 700; color: var(--primary-color);">Welcome Hall</h2>
                <p style="margin:10px 0 0">Step into luxury at our main entrance.</p>
                <div class="items-container" style="margin-top:15px; display: flex; flex-wrap: wrap; gap: 10px;"></div>
            </div>

            <div class="location-card" id="card-urbanwolk">
                <button class="btn-back" onclick="goBack()">← Back</button>
                <div class="img-container"></div>
                <h2 style="margin:0; font-weight: 700; color: var(--primary-color);">Urban Wolk</h2>
                <p style="margin:10px 0 0">Experience the vibe of modern city life.</p>
                <div class="items-container" style="margin-top:15px; display: flex; flex-wrap: wrap; gap: 10px;"></div>
            </div>

            <div class="location-card" id="card-electra">
                <button class="btn-back" onclick="goBack()">← Back</button>
                <div class="img-container"></div>
                <h2 style="margin:0; font-weight: 700; color: var(--primary-color);">Electra</h2>
                <p style="margin:10px 0 0">The hub of future electric innovation.</p>
                <div class="items-container" style="margin-top:15px; display: flex; flex-wrap: wrap; gap: 10px;"></div>
            </div>

            <div class="location-card" id="card-gardan">
                <button class="btn-back" onclick="goBack()">← Back</button>
                <div class="img-container"></div>
                <h2 style="margin:0; font-weight: 700; color: var(--primary-color);">Gardan</h2>
                <p style="margin:10px 0 0">Refresh your senses in our green zone.</p>
                <div class="items-container" style="margin-top:15px; display: flex; flex-wrap: wrap; gap: 10px;"></div>
            </div>

        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyB_b97VYqxV4cmNfQPCdXBfRDLG-Wjzlas",
          authDomain: "showroom-6b354.firebaseapp.com",
          projectId: "showroom-6b354",
          storageBucket: "showroom-6b354.firebasestorage.app",
          messagingSenderId: "261135013864",
          appId: "1:261135013864:web:2f718ebf2b7a411852365d",
          measurementId: "G-Q8B3XR50PF"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getDatabase(app);
        console.log("Firebase Connected Successfully");

        // --- REAL-TIME DATA FETCHING FROM FIREBASE ---

        // 1. Fetch Dynamic Locations
        onValue(ref(db, 'locations'), (snapshot) => {
            const data = snapshot.val();
            if(data) {
                Object.values(data).forEach(loc => {
                    createLocationElement(loc.id, loc.title, loc.desc);
                });
            }
        });

        // 2. Fetch Main Images (Covers)
        onValue(ref(db, 'images'), (snapshot) => {
            const data = snapshot.val();
            if(data) {
                for(let id in data) {
                    const card = document.getElementById(id);
                    if (card) {
                        card.querySelector('.img-container').innerHTML = `<img src="${data[id].url}" style="width:100%; border-radius:10px; margin-bottom:15px;">`;
                    }
                }
            }
        });

        // 3. Fetch Items
        onValue(ref(db, 'items'), (snapshot) => {
            const data = snapshot.val();
            if(data) {
                for(let locId in data) {
                    const card = document.getElementById(locId);
                    if(card) {
                       const container = card.querySelector('.items-container');
                       container.innerHTML = ""; // Clear existing
                       Object.values(data[locId]).forEach(item => {
                           const locTitle = card.querySelector('h2').innerText;
                           container.innerHTML += `
                            <div class="item-box" data-name="${item.name}" style="width: 80px; text-align: center;">
                                <img src="${item.url}" style="width:100%; border-radius:5px;">
                                <small>${item.name}</small><br>
                                <em style="font-size:9px; color:var(--accent-color)">${locTitle}</em>
                            </div>`;
                       });
                    }
                }
            }
        });
    </script>

    <script>
        // Keeping helper functions for UI
        function createLocationElement(id, title, desc) {
            const grid = document.getElementById('locationsGrid');
            if(document.getElementById(id)) return;
            const card = document.createElement('div');
            card.className = 'location-card';
            card.id = id;
            card.innerHTML = `
                <button class="btn-back" onclick="goBack()">← Back</button>
                <div class="img-container"></div>
                <h2 style="margin:0; font-weight: 700; color: var(--primary-color);">${title}</h2>
                <p style="margin:10px 0 0">${desc}</p>
                <div class="items-container" style="margin-top:15px; display: flex; flex-wrap: wrap; gap: 10px;"></div>
            `;
            grid.appendChild(card);
        }

        function showAllLocations() {
            document.getElementById('locationsGrid').style.display = 'grid';
            document.getElementById('statusText').style.display = 'block';
            
            let cards = document.getElementsByClassName('location-card');
            for (let i = 0; i < cards.length; i++) {
                cards[i].style.display = "block";
                let items = cards[i].getElementsByClassName('item-box');
                for(let j=0; j<items.length; j++) items[j].style.display = "block";
            }
        }

        function filterLocations() {
            const rawInput = document.getElementById('locationSearch').value.toLowerCase();
            const normalizedInput = rawInput.replace(/[-\s]/g, '');
            let grid = document.getElementById('locationsGrid');
            let status = document.getElementById('statusText');
            let cards = document.getElementsByClassName('location-card');

            if (rawInput.length > 0) {
                grid.style.display = 'grid';
                status.style.display = 'block';
            } else {
                grid.style.display = 'none';
                status.style.display = 'none';
            }

            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getElementsByTagName('h2')[0].innerText.toLowerCase();
                let items = cards[i].getElementsByClassName('item-box');
                let foundItem = false;

                for(let j=0; j < items.length; j++) {
                    let itemName = items[j].getAttribute('data-name').toLowerCase();
                    let normalizedItemName = itemName.replace(/[-\s]/g, '');
                    if(normalizedItemName.includes(normalizedInput)) {
                        items[j].style.display = "block";
                        foundItem = true;
                    } else {
                        items[j].style.display = (rawInput === "") ? "block" : "none";
                    }
                }

                if (title.includes(rawInput) || foundItem) {
                    cards[i].style.display = "block";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        function goBack() {
            document.getElementById('locationSearch').value = "";
            document.getElementById('locationsGrid').style.display = 'none';
            document.getElementById('statusText').style.display = 'none';
        }
    </script>

</body>
</html>
