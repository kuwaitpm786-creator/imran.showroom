<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tic Tac Toe - Pro</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  :root {
    --bg-dark: #1a1f26;
    --header-dark: #111;
    --green-accent: #0d6144;
    --red-accent: #da3633;
    --input-bg: #333;
    --text-gray: #8b949e;
    --yellow-accent: #f1c40f;
    --blue-accent: #3498db;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
body { background-color: var(--bg-dark); color: white; overflow-x: hidden; }

/* Updated Nav: Removed hamburger and centered logo */
.top-nav { 
    background: var(--header-dark); 
    padding: 12px; 
    display: flex; 
    flex-direction: column; /* Added to stack Tic Tac Toe and Showroom */
    justify-content: center; 
    align-items: center; 
    border-bottom: 1px solid #333; 
}
.logo-text { font-weight: 800; font-size: 1.2rem; color: var(--yellow-accent); }
/* Showroom Text Style */
.showroom-text { font-size: 1rem; color: white; margin-top: 2px; font-weight: bold; }

.banner-bar { background-color: #0d4429; display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; font-size: 13px; }

.action-btns { display: flex; gap: 5px; }

.btn-top { padding: 5px 10px; border: none; border-radius: 3px; font-weight: bold; color: white; cursor: pointer; font-size: 11px; }
.btn-deposit { background: #238636; }

.btn-main { padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; color: white; cursor: pointer; background-color: var(--green-accent); }

.btn-back { background: var(--red-accent); color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 5px; margin-bottom: 10px; }

.container { padding: 15px; }

#mainDashboard { display: block; text-align: center; padding-top: 50px; }
#amountScreen, #qrScreen, #uploadModal { display: none; }

.amount-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 15px; }
.amt-box { border: 1px solid #444; padding: 10px 0; text-align: center; font-size: 12px; cursor: pointer; background: transparent; }

.amount-input-wrapper { background: #12161c; display: flex; align-items: center; padding: 12px; border-radius: 4px; margin-bottom: 20px; border: 1px solid #333; }

.overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 1000; overflow-y: auto; }

.qr-card { background: #242c37; padding: 20px; border-radius: 4px; text-align: center; margin-top: 10px; }

.qr-img-box { width: 100%; max-width: 240px; background: white; margin: 15px auto; padding: 10px; border-radius: 8px; }
.qr-img-box img { width: 100%; height: auto; display: block; }

/* Google Style Search Box Styling */
.google-search-container {
    margin: 20px auto 40px auto;
    max-width: 500px;
    width: 90%;
}
.search-box-wrapper {
    background: white;
    display: flex;
    align-items: center;
    padding: 10px 20px;
    border-radius: 30px;
    box-shadow: 0 1px 6px rgba(32,33,36,0.28);
}
.search-box-wrapper input {
    border: none;
    outline: none;
    flex-grow: 1;
    font-size: 16px;
    color: #202124;
    padding: 0 10px;
}
.search-box-wrapper i {
    color: #9aa0a6;
    font-size: 18px;
}

.upload-box { border: 2px dashed #4a5568; padding: 30px; text-align: center; color: #8b949e; margin: 15px 0; border-radius: 4px; cursor: pointer; }
</style>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-nav">
        <div class="logo-section" onclick="location.reload()" style="cursor:pointer; text-align: center;">
            <div class="showroom-text">Showroom</div>
        </div>
    </header>

    <div class="banner-bar">
        <span></span>
        <div class="action-btns">
            </div>
    </div>

    <div class="container" id="mainDashboard">
        
        <div class="google-search-container">
            <h1 style="color: white; margin-bottom: 20px; font-size: 2.5rem; font-weight: 500;">
                <span style="color: #4285F4;">S</span><span style="color: #EA4335;">h</span><span style="color: #FBBC05;">o</span><span style="color: #4285F4;">w</span><span style="color: #34A853;">r</span><span style="color: #EA4335;">o</span><span style="color: #FBBC05;">o</span><span style="color: #34A853;">m</span>
            </h1>
            <div class="search-box-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search Showroom or type a URL">
                <i class="fas fa-microphone"></i>
            </div>
        </div>

        <div style="color:var(--text-gray); margin-bottom: 30px;">
            <p style="font-size:12px;">Select 'Open Door Showroom' to add coins.</p>
        </div>

        <button class="btn-main btn-deposit" style="width:100%; margin-bottom: 10px;" onclick="openAmountScreen('Deposit')">
            Open Door Showroom
        </button>

    </div>

    <div id="amountScreen" class="container">
        <button class="btn-back" onclick="location.reload()" style="background:#da3633;">
            <i class="fas fa-arrow-left"></i> Back
        </button>

        <div class="amount-grid">
            <div class="amt-box" onclick="setAmount(300, 'adminQR'); goToQR();" style="font-size: 10px; font-weight: bold;">Welcome Hall</div>
            <div class="amt-box" onclick="setAmount(500, 'urbanQR'); goToQR();" style="font-size: 10px; font-weight: bold;">Urban Walk</div>
            <div class="amt-box" onclick="setAmount(1000, 'electraQR'); goToQR();" style="font-size: 10px; font-weight: bold;">Elactra</div>
            <div class="amt-box" onclick="setAmount(5000, 'prayerQR'); goToQR();" style="font-size: 10px; font-weight: bold;">Prayer Hall</div>
            <div class="amt-box" onclick="setAmount(10000, 'amenitiesQR'); goToQR();" style="font-size: 9px; font-weight: bold;">Public Amenities</div>
        </div>

        <div class="amount-input-wrapper">
            <div onclick="adjustAmount(-100)" style="padding:0 15px; cursor:pointer;">
                <i class="fas fa-minus"></i>
            </div>
            <div id="amtLabel" style="flex-grow:1; text-align:center; font-weight:bold;">Amount</div>
            <div onclick="adjustAmount(100)" style="padding:0 15px; cursor:pointer;">
                <i class="fas fa-plus"></i>
            </div>
        </div>

        </div>

    <div id="qrScreen" class="container">
        <button class="btn-back" onclick="openAmountScreen('Deposit')" style="background:#da3633;">
            <i class="fas fa-arrow-left"></i> Back
        </button>

        <div style="font-size: 14px; margin-bottom: 10px;">
            Selected Amount: 
            <span id="finalAmt" style="color:var(--yellow-accent);">₹0</span>
        </div>

        <div class="qr-card">
            <h4 style="margin-bottom:5px;">IMRAN AHMAD ANSARI</h4>
            <p style="font-size:12px; color:#8b949e;">Scan & Pay Using PhonePe App</p>
            <hr style="border:0; border-top:1px solid #444; margin:10px 0;">

            <div class="qr-img-box">
                <img id="main-qr-image" src="https://i.ibb.co/pBfV57Bq/1000082467.jpg" alt="QR Code">
            </div>

            <p style="font-size:11px; color:#8b949e;">(Min: 300 Max: 100000)</p>

            <button class="btn-main" style="width:100%; margin-top:15px;" onclick="openUploadModal()">Pay Now</button>
        </div>
    </div>

    <div id="uploadModal" class="overlay" style="background: rgba(0,0,0,0.9);">
        <div style="padding: 20px; max-width: 400px; margin: 50px auto; background: var(--bg-dark); border-radius: 8px; border-top: 3px solid var(--green-accent);">

            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h4 style="color:var(--yellow-accent);">Deposit</h4>
                <i class="fas fa-times" onclick="closeUploadModal()" style="cursor:pointer;"></i>
            </div>

            <p style="font-size:12px; color:var(--text-gray);">
                Image Upload <span style="color:red;">*</span>
            </p>

            <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-plus-circle" style="font-size:24px;"></i><br>
                <span id="fileNameDisplay" style="font-size:12px;">upload payment screenshot</span>
                <input type="file" id="fileInput" style="display:none;" onchange="updateFileName(this)">
            </div>

            <button class="btn-main" style="width:100%;" onclick="finalSubmit()">Submit</button>
        </div>
    </div>
    <script>
let currentAmount = 0;
let selectedCategoryKey = 'adminQR'; // Default key

window.onload = function() {
    // Initial default load
    const savedQR = localStorage.getItem('adminQR');
    if(savedQR) {
        document.getElementById('main-qr-image').src = savedQR;
    }
}

function openAmountScreen(mode) {
    document.getElementById('mainDashboard').style.display = 'none';
    document.getElementById('amountScreen').style.display = 'block';
    document.getElementById('qrScreen').style.display = 'none';
}

function setAmount(v, key) { 
    currentAmount = v; 
    selectedCategoryKey = key || 'adminQR'; 
    updateUI(); 
}

function adjustAmount(v) { 
    currentAmount += v; 
    if(currentAmount < 0) currentAmount = 0; 
    updateUI(); 
}

function updateUI() { 
    document.getElementById('amtLabel').innerText = currentAmount > 0 ? "₹" + currentAmount : "Amount"; 
}

function goToQR() {
    if(currentAmount < 300) return alert("Minimum ₹300 required");
    
    // Load image based on the button clicked
    const savedQR = localStorage.getItem(selectedCategoryKey);
    if(savedQR) {
        document.getElementById('main-qr-image').src = savedQR;
    } else {
        // Fallback default image if nothing saved for this category
        document.getElementById('main-qr-image').src = "https://i.ibb.co/pBfV57Bq/1000082467.jpg";
    }

    document.getElementById('amountScreen').style.display = 'none';
    document.getElementById('qrScreen').style.display = 'block';
    document.getElementById('finalAmt').innerText = "₹" + currentAmount;
}

function openUploadModal() { 
    document.getElementById('uploadModal').style.display = 'block'; 
}

function closeUploadModal() { 
    document.getElementById('uploadModal').style.display = 'none'; 
}

function updateFileName(input) {
    if(input.files && input.files[0]) {
        document.getElementById('fileNameDisplay').innerText = "Selected: " + input.files[0].name;
    }
}

function finalSubmit() {
    if(!document.getElementById('fileInput').files[0]) 
        return alert("Please upload screenshot!");

    alert("Deposit Request Submitted Successfully!");
    location.reload();
}

/* toggleReport function and logic removed as requested */
    </script>

    <script src="script.js"></script>

</body>
</html>
