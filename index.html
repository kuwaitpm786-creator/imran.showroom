<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tic Tac Toe - Pro</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  :root {
    --bg-dark: #1a1f26;
    --header-dark: #111;
    --green-accent: #0d6144;
    --red-accent: #da3633;
    --input-bg: #333;
    --text-gray: #8b949e;
    --yellow-accent: #f1c40f;
    --blue-accent: #3498db;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', 'Roboto', sans-serif; }
body { 
    background: linear-gradient(45deg, #1a1f26, #23a6d5, #0d6144, #1a1f26);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: white; 
    overflow-x: hidden; 
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.top-nav { 
    background: rgba(17, 17, 17, 0.8); 
    backdrop-filter: blur(15px);
    padding: 12px; 
    display: flex; 
    flex-direction: column;
    justify-content: center; 
    align-items: center; 
    border-bottom: 1px solid rgba(255,255,255,0.1); 
    position: sticky;
    top: 0;
    z-index: 1000;
}
.showroom-text { 
    font-size: 1.2rem; 
    letter-spacing: 3px;
    background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-top: 2px; 
    font-weight: bold; 
}

.banner-bar { background-color: rgba(13, 68, 41, 0.8); display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; font-size: 13px; }

.btn-main { 
    padding: 16px 40px; 
    border: none; 
    border-radius: 50px; 
    font-weight: bold; 
    color: white; 
    cursor: pointer; 
    background-color: var(--green-accent); 
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.btn-main:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
}

.btn-back { background: var(--red-accent); color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 5px; margin-bottom: 10px; }

.container { padding: 15px; }

#mainDashboard { display: block; text-align: center; padding-top: 50px; }
#amountScreen, #qrScreen, #uploadModal { display: none; }

.amount-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
    gap: 15px; 
    margin-bottom: 15px; 
}
.amt-box { 
    border: 1px solid rgba(255,255,255,0.2); 
    padding: 20px 10px; 
    text-align: center; 
    font-size: 14px; 
    cursor: pointer; 
    background: rgba(255,255,255,0.1); 
    border-radius: 12px;
    backdrop-filter: blur(5px);
    transition: 0.3s;
}
.amt-box:hover { background: white; color: black; }

.overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 1000; overflow-y: auto; }

.qr-card { background: #242c37; padding: 20px; border-radius: 4px; text-align: center; margin-top: 10px; }

.qr-img-box { width: 100%; max-width: 240px; background: white; margin: 15px auto; padding: 10px; border-radius: 8px; cursor: pointer; }
.qr-img-box img { width: 100%; height: auto; display: block; }

/* Sample Details Styling on QR Page */
.sample-details-box {
    margin-top: 20px;
    background: rgba(0,0,0,0.3);
    padding: 15px;
    border-radius: 10px;
    text-align: left;
    border-left: 4px solid var(--yellow-accent);
}
.sample-details-box h4 { color: var(--yellow-accent); margin-bottom: 10px; font-size: 14px; }
.sample-details-box p { font-size: 13px; line-height: 1.6; white-space: pre-line; }

/* Search Suggestions */
.google-search-container { margin: 20px auto 10px auto; max-width: 600px; width: 90%; position: relative; }
.search-box-wrapper {
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    padding: 12px 25px;
    border-radius: 60px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.4);
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}
.search-box-wrapper input { border: none; outline: none; flex-grow: 1; font-size: 18px; color: white; background: transparent; }

#searchSuggestions {
    position: absolute; top: 100%; left: 5%; right: 5%;
    background: rgba(26, 31, 38, 0.98);
    border-radius: 15px; margin-top: 10px;
    max-height: 300px; overflow-y: auto; display: none;
    z-index: 1100; border: 1px solid rgba(255,255,255,0.1);
}
.suggestion-item { padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; text-align: left; }
.suggestion-item span { color: var(--yellow-accent); font-size: 11px; display: block; }

.luxury-logo { font-size: clamp(50px, 12vw, 80px); font-weight: 900; margin-bottom: 30px; }
.highlight-box { border: 2px solid var(--yellow-accent) !important; background: rgba(241, 196, 15, 0.2) !important; transform: scale(1.05); }

/* --- Full Screen Image Zoom & Pan CSS --- */
#imageZoomOverlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 2000;
    overflow: hidden;
    touch-action: none; /* Prevents default browser scaling */
}
#zoomContainer {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}
#zoomContainer img {
    max-width: 100%;
    max-height: 100%;
    transform-origin: center;
    transition: transform 0.1s ease-out;
}
.close-zoom-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: white;
    color: black;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    z-index: 2100;
}
</style>
</head>
<body>

    <header class="top-nav">
        <div onclick="location.reload()" style="cursor:pointer; text-align: center;">
            <div class="showroom-text">SHOWROOM</div>
        </div>
    </header>

    <div class="banner-bar"><span></span></div>

    <div class="container" id="mainDashboard">
        <div class="google-search-container">
            <div class="luxury-logo">
                <span style="color:#4285F4">S</span><span style="color:#EA4335">h</span><span style="color:#FBBC05">o</span><span style="color:#4285F4">w</span><span style="color:#34A853">r</span><span style="color:#EA4335">o</span><span style="color:#FBBC05">o</span><span style="color:#34A853">m</span>
            </div>
            <div class="search-box-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="mainSearch" placeholder="Search Samples or Locations..." oninput="handleGlobalSearch(this.value)">
            </div>
            <div id="searchSuggestions"></div>
        </div>
        <button class="btn-main btn-deposit" style="width:100%;" onclick="openAmountScreen('Deposit')">Open Door Showroom</button>
    </div>

    <div id="amountScreen" class="container">
        <button class="btn-back" onclick="goToHome()"><i class="fas fa-arrow-left"></i> Back</button>
        <h2 style="text-align: center; margin-bottom: 20px; color: var(--yellow-accent);">LUXURY COLLECTIONS</h2>
        <div class="amount-grid" id="locationGrid">
            <div class="amt-box" data-name="Welcome Hall" onclick="setAmount(0, 'adminQR'); goToQR();">Welcome Hall</div>
            <div class="amt-box" data-name="Urban Walk" onclick="setAmount(0, 'urbanQR'); goToQR();">Urban Walk</div>
            <div class="amt-box" data-name="Electra" onclick="setAmount(0, 'electraQR'); goToQR();">Electra</div>
            <div class="amt-box" data-name="Prayer Hall" onclick="setAmount(0, 'prayerQR'); goToQR();">Prayer Hall</div>
            <div class="amt-box" data-name="Public Amenities" onclick="setAmount(0, 'amenitiesQR'); goToQR();">Public Amenities</div>
            <div class="amt-box" data-name="The Garder" onclick="setAmount(0, 'garderQR'); goToQR();">The Garder</div>
            <div class="amt-box" data-name="The Mall" onclick="setAmount(0, 'mallQR'); goToQR();">The Mall</div>
            <div class="amt-box" data-name="Sauq-Dome Area" onclick="setAmount(0, 'sauqDomeQR'); goToQR();">Sauq-Dome Area</div>
            <div class="amt-box" data-name="The Souq" onclick="setAmount(0, 'theSouqQR'); goToQR();">The Souq</div>
            <div class="amt-box" data-name="Souq-Date Market" onclick="setAmount(0, 'souqDateQR'); goToQR();">Souq-Date Market</div>
            <div class="amt-box" data-name="Food Court" onclick="setAmount(0, 'foodCourtQR'); goToQR();">Food Court</div>
        </div>
    </div>

    <div id="qrScreen" class="container">
        <button class="btn-back" onclick="openAmountScreen('Deposit')"><i class="fas fa-arrow-left"></i> Back</button>
        <div class="qr-card">
            <div class="qr-img-box" onclick="toggleFullScreenZoom()"><img id="main-qr-image" src="" alt="QR"></div>
            <div class="sample-details-box">
                <h4>LOCATION SAMPLES:</h4>
                <p id="locationSamplesText">No samples listed.</p>
            </div>
            </div>
    </div>

    <div id="imageZoomOverlay">
        <div class="close-zoom-btn" onclick="closeFullScreenZoom()">&times;</div>
        <div id="zoomContainer">
            <img id="zoomTarget" src="" alt="Zoomed View">
        </div>
    </div>

    <div id="uploadModal" class="overlay">
        <div style="padding: 20px; max-width: 400px; margin: 50px auto; background: var(--bg-dark); border-radius: 8px;">
            <h4 style="color:var(--yellow-accent);">Submit Payment</h4>
            <div style="border:2px dashed #444; padding:30px; margin:20px 0; text-align:center;" onclick="document.getElementById('fileInput').click()">
                <span id="fileNameDisplay">Upload Screenshot</span>
                <input type="file" id="fileInput" style="display:none;" onchange="updateFileName(this)">
            </div>
            <button class="btn-main" style="width:100%;" onclick="location.reload()">Submit</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDqoWrKntd-qMHTE8u7yd4-2M_C0SbjYHc",
          authDomain: "gameadda-48c68.firebaseapp.com",
          databaseURL: "https://gameadda-48c68-default-rtdb.firebaseio.com",
          projectId: "gameadda-48c68",
          storageBucket: "gameadda-48c68.firebasestorage.app",
          messagingSenderId: "333499445245",
          appId: "1:333499445245:web:5227528c6c0004677ef394",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let selectedCategoryKey = 'adminQR';
        let allLocationData = {};
        let qrData = {};

        // Fetch All Data
        onValue(ref(db, 'barcodes'), (snap) => qrData = snap.val() || {});
        onValue(ref(db, 'locationData'), (snap) => allLocationData = snap.val() || {});

        window.handleGlobalSearch = function(query) {
            const q = query.toLowerCase().trim();
            const suggest = document.getElementById('searchSuggestions');
            suggest.innerHTML = "";
            if(!q) { suggest.style.display="none"; return; }
            suggest.style.display="block";

            // 1. Search in Locations
            document.querySelectorAll('.amt-box').forEach(box => {
                const name = box.getAttribute('data-name');
                if(name.toLowerCase().includes(q)) {
                    createSuggestItem(name, "Location", name);
                }
            });

            // 2. Search in Samples
            for(let id in allLocationData) {
                const samples = allLocationData[id].samples || "";
                if(samples.toLowerCase().includes(q)) {
                    const locName = document.querySelector(`[onclick*="${id}"]`).getAttribute('data-name');
                    // Find specific line containing the sample
                    const lines = samples.split('\n');
                    lines.forEach(line => {
                        if(line.toLowerCase().includes(q)) {
                            createSuggestItem(line, "In: " + locName, locName);
                        }
                    });
                }
            }
        };

        function createSuggestItem(text, sub, locName) {
            const div = document.createElement('div');
            div.className = 'suggestion-item';
            div.innerHTML = `${text} <span>${sub}</span>`;
            div.onclick = () => selectSearchResult(locName);
            document.getElementById('searchSuggestions').appendChild(div);
        }

        window.selectSearchResult = function(locName) {
            document.getElementById('searchSuggestions').style.display="none";
            document.getElementById('mainSearch').value = "";
            openAmountScreen();
            document.querySelectorAll('.amt-box').forEach(box => {
                if(box.getAttribute('data-name') === locName) {
                    box.classList.add('highlight-box');
                    box.style.display = "block";
                    box.scrollIntoView({behavior:'smooth'});
                } else { box.style.display = "none"; }
            });
        };

        window.goToHome = function() {
            document.getElementById('mainDashboard').style.display='block';
            document.getElementById('amountScreen').style.display='none';
            document.getElementById('qrScreen').style.display='none';
            document.querySelectorAll('.amt-box').forEach(b => {b.style.display="block"; b.classList.remove('highlight-box')});
        };

        window.openAmountScreen = function() {
            document.getElementById('mainDashboard').style.display='none';
            document.getElementById('amountScreen').style.display='block';
        };

        window.setAmount = (v, key) => selectedCategoryKey = key;

        window.goToQR = function() {
            document.getElementById('main-qr-image').src = qrData[selectedCategoryKey] || "";
            document.getElementById('locationSamplesText').innerText = allLocationData[selectedCategoryKey]?.samples || "No samples listed.";
            document.getElementById('amountScreen').style.display='none';
            document.getElementById('qrScreen').style.display='block';
        };

        window.openUploadModal = () => document.getElementById('uploadModal').style.display='block';
        window.updateFileName = (i) => document.getElementById('fileNameDisplay').innerText = i.files[0].name;

        // --- IMAGE ZOOM & PAN LOGIC ---
        let scale = 1, posX = 0, posY = 0, lastX = 0, lastY = 0, isDragging = false;
        const targetImg = document.getElementById('zoomTarget');

        window.toggleFullScreenZoom = function() {
            const mainSrc = document.getElementById('main-qr-image').src;
            if(!mainSrc) return;
            targetImg.src = mainSrc;
            document.getElementById('imageZoomOverlay').style.display = 'block';
            resetZoom();
        };

        window.closeFullScreenZoom = function() {
            document.getElementById('imageZoomOverlay').style.display = 'none';
        };

        function resetZoom() {
            scale = 1; posX = 0; posY = 0;
            updateTransform();
        }

        function updateTransform() {
            targetImg.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        // Mouse & Touch Interaction for Zoom/Pan
        const overlay = document.getElementById('imageZoomOverlay');

        overlay.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.2 : 0.2;
            scale = Math.min(Math.max(1, scale + delta), 5);
            if (scale === 1) { posX = 0; posY = 0; }
            updateTransform();
        }, { passive: false });

        overlay.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                lastX = e.touches[0].clientX - posX;
                lastY = e.touches[0].clientY - posY;
            }
        });

        overlay.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1 && scale > 1) {
                posX = e.touches[0].clientX - lastX;
                posY = e.touches[0].clientY - lastY;
                updateTransform();
            }
        });

        overlay.addEventListener('touchend', () => isDragging = false);

        // Double Click/Tap to quick zoom
        overlay.addEventListener('dblclick', () => {
            if (scale > 1) resetZoom();
            else { scale = 2.5; updateTransform(); }
        });
    </script>
</body>
</html>
